<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Finance Tracker Fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fef9f4;
            --card-bg: #ffffff;
            --text: #2d2a3a;
            --text-secondary: #7c7a8e;
            --primary: #8b5cf6;
            --primary-light: #f1edff;
            --danger: #f43f5e;
            --danger-light: #ffe4e6;
            --income: #10b981;
            --income-light: #d1fae5;
            --border: #e9e4f0;
            --shadow-sm: 0 2px 6px rgba(139,92,246,0.08);
            --shadow: 0 6px 20px rgba(139,92,246,0.1);
            --radius: 20px;
            --transition: 0.25s cubic-bezier(0.2,0.8,0.4,1);
            --tab-active: #8b5cf6;
            --tab-inactive: #7c7a8e;
            --chart-bar: #8b5cf6;
        }
        .dark {
            --bg: #0f0b1f;
            --card-bg: #1e1635;
            --text: #f0eefc;
            --text-secondary: #b5b0d9;
            --primary: #c4b5fd;
            --primary-light: #2d2255;
            --danger: #fb7185;
            --danger-light: #3a1e2b;
            --income: #34d399;
            --income-light: #0b3825;
            --border: #2e2655;
            --shadow-sm: 0 2px 6px rgba(0,0,0,0.3);
            --shadow: 0 6px 20px rgba(0,0,0,0.4);
            --tab-active: #c4b5fd;
            --tab-inactive: #b5b0d9;
            --chart-bar: #a78bfa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 110px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -20%;
            width: 140%;
            height: 70%;
            background: linear-gradient(135deg, #f9a8d4, #a78bfa, #60a5fa);
            opacity: 0.05;
            z-index: -1;
            filter: blur(80px);
            pointer-events: none;
        }
        .dark body::before { opacity: 0.03; }

        .header {
            padding: 14px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg);
            backdrop-filter: blur(15px);
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        .header-left {
            display: flex;
            flex-direction: column;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f43f5e, #8b5cf6, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: -2px;
        }
        .header-credits {
            font-size: 0.65rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            color: var(--text-secondary);
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .icon-btn:hover {
            transform: translateY(-2px);
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 6px 16px rgba(139,92,246,0.15);
        }

        .tab-bar {
            display: flex;
            margin: 0 20px 8px;
            border-bottom: 2px solid var(--border);
            gap: 0;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            min-width: fit-content;
            padding: 14px 12px;
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--tab-inactive);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }
        .tab-btn.active { color: var(--tab-active); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--tab-active);
            border-radius: 2px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .balance-card {
            margin: 12px 20px 8px;
            padding: 24px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .balance-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: var(--primary);
            opacity: 0.07;
            border-radius: 50%;
        }
        .balance-card .label { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .balance-card .amount { font-size: 3rem; font-weight: 800; margin: 8px 0 4px; }
        .balance-msg { font-size: 0.85rem; font-weight: 500; margin-top: 6px; opacity: 0.9; }

        .monthly-card {
            margin: 12px 20px;
            padding: 18px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .month-nav button {
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            width: 38px;
            height: 38px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .month-nav button:hover { background: var(--primary); color: white; transform: scale(1.05); }
        .month-label { font-weight: 700; font-size: 1.2rem; text-transform: capitalize; }
        .summary-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .summary-item {
            flex: 1;
            background: var(--bg);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .summary-item .label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .summary-item .value { font-size: 1.3rem; font-weight: 700; }
        .income-value { color: var(--income); }
        .expense-value { color: var(--danger); }
        .budget-bar { margin: 12px 0 8px; height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; }
        .budget-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #f43f5e); width: 0%; transition: width 0.5s ease; border-radius: 6px; }
        .budget-label { font-size: 0.75rem; color: var(--text-secondary); display: flex; justify-content: space-between; }
        .month-balance { text-align: center; font-weight: 700; font-size: 1rem; padding-top: 10px; border-top: 1px solid var(--border); }

        .transaction-list, .bill-list { padding: 0 20px; }
        .transaction-item, .bill-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition), box-shadow var(--transition);
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }
        .transaction-item:hover, .bill-item:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .txn-emoji, .bill-emoji {
            font-size: 2rem;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 14px;
        }
        .txn-info, .bill-info { flex: 1; min-width: 0; }
        .txn-info .description, .bill-info .description { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .txn-info .meta, .bill-info .meta { font-size: 0.7rem; color: var(--text-secondary); }
        .txn-info .note, .bill-info .note { font-size: 0.75rem; color: var(--text-secondary); font-style: italic; margin-top: 2px; }
        .txn-amount, .bill-amount { font-weight: 700; font-size: 1rem; white-space: nowrap; }
        .txn-amount.income { color: var(--income); }
        .txn-amount.expense { color: var(--danger); }
        .bill-amount.pending { color: var(--danger); }
        .bill-amount.paid { color: var(--income); text-decoration: line-through; }
        .delete-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px; border-radius: 10px; font-size: 1.1rem; transition: all var(--transition); }
        .delete-btn:hover { background: var(--danger-light); color: var(--danger); }
        .bill-paid-check { width: 24px; height: 24px; accent-color: var(--income); cursor: pointer; margin-right: 8px; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; background: var(--card-bg);
            border-top: 1px solid var(--border); display: flex; padding: 12px 20px; gap: 12px;
            backdrop-filter: blur(15px); box-shadow: 0 -6px 20px rgba(0,0,0,0.05);
            z-index: 20;
        }
        .btn-action {
            flex: 1; padding: 14px 10px; border: none; border-radius: 14px;
            font-weight: 700; font-size: 1rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 6px;
            transition: all var(--transition); color: white; letter-spacing: 0.3px;
        }
        .btn-income { background: var(--income); box-shadow: 0 4px 14px rgba(16,185,129,0.3); }
        .btn-income:hover { background: #059669; transform: translateY(-2px); }
        .btn-expense { background: var(--danger); box-shadow: 0 4px 14px rgba(244,63,94,0.3); }
        .btn-expense:hover { background: #e11d48; transform: translateY(-2px); }
        .btn-bill { background: #f59e0b; box-shadow: 0 4px 14px rgba(245,158,11,0.3); }
        .btn-bill:hover { background: #d97706; transform: translateY(-2px); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border-radius: 28px; padding: 28px 24px;
            width: 90%; max-width: 400px; box-shadow: 0 24px 48px rgba(0,0,0,0.2);
            border: 1px solid var(--border); animation: modalSlide 0.25s ease;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalSlide { from { opacity: 0; transform: translateY(30px) scale(0.96); } }
        .modal-content h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--text-secondary); }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;
            background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: inherit;
            transition: border var(--transition);
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .emoji-picker button { font-size: 1.6rem; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all var(--transition); }
        .emoji-picker button.selected { background: var(--primary-light); border-color: var(--primary); transform: scale(1.15); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; }
        .btn-cancel { background: var(--border); color: var(--text); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(139,92,246,0.3); }

        .setting-group { margin-bottom: 18px; }
        .setting-group .group-label { font-weight: 700; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .option-list button {
            display: block; width: 100%; padding: 12px 14px; background: none; border: 1px solid var(--border);
            border-radius: 10px; text-align: left; font-size: 0.95rem; color: var(--text); cursor: pointer;
            margin-bottom: 6px; transition: background var(--transition);
        }
        .option-list button.active { background: var(--primary); color: white; border-color: var(--primary); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .help-text { line-height: 1.6; font-size: 0.95rem; }
        .help-text p { margin-bottom: 12px; }
        .help-text strong { color: var(--primary); }

        .confetti {
            position: fixed; width: 10px; height: 10px; background: #f43f5e; opacity: 0.8;
            border-radius: 2px; z-index: 200; pointer-events: none;
            animation: confettiFall 1s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .report-period-selector { display: flex; justify-content: center; gap: 10px; margin: 10px 20px; }
        .report-period-selector select { padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: 600; font-size: 0.95rem; }
        .report-summary-cards { display: flex; gap: 10px; margin: 12px 20px; }
        .report-card { flex: 1; background: var(--card-bg); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .report-card .label { font-size: 0.8rem; color: var(--text-secondary); }
        .report-card .value { font-size: 1.5rem; font-weight: 700; }
        .report-chart { margin: 12px 20px; background: var(--card-bg); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; margin-top: 10px; }
        .chart-bar { flex: 1; border-radius: 8px 8px 0 0; min-height: 4px; transition: height 0.3s; }
        .chart-labels { display: flex; gap: 6px; margin-top: 6px; font-size: 0.65rem; color: var(--text-secondary); justify-content: space-around; }
        .chart-label { flex: 1; text-align: center; }
        .export-import-btns { display: flex; gap: 10px; margin: 16px 20px; }
        .btn-export, .btn-import { flex: 1; padding: 12px; border-radius: 14px; font-weight: 700; border: none; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 6px; color: white; transition: all var(--transition); }
        .btn-export { background: #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .btn-import { background: #8b5cf6; box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
        #importFileInput { display: none; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <h1 id="appTitle">💰 Fintracker</h1>
        <div class="header-credits">par Ragane Zik</div>
    </div>
    <div class="header-actions">
        <div class="icon-btn" id="helpBtn" title="Aide">❓</div>
        <div class="icon-btn" id="darkModeToggle">🌙</div>
        <div class="icon-btn" id="settingsToggle">⚙️</div>
    </div>
</header>
